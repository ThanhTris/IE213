services:
  # ============================================
  # BACKEND — Node.js/Express Web Service
  # ============================================
  - type: web
    name: e-warranty-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    branch: staging
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false # Điền tay trên Render Dashboard
      - key: PINATA_JWT
        sync: false # Điền tay trên Render Dashboard
      - key: FRONTEND_URL
        sync: false # URL của static site — điền sau khi biết
      - key: DEMO_MODE
        value: "true" # Tắt bằng cách đổi thành "false" trên Render Dashboard

  # ============================================
  # FRONTEND — React/Vite Static Site
  # ============================================
  - type: web
    name: e-warranty-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    branch: staging
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # URL backend — điền sau khi backend deploy xong
      - key: VITE_CONTRACT_ADDRESS
        value: "0xF79Fb7022B5AfB635FC0BD65682271db766bab14"
      - key: VITE_NETWORK_ID
        value: "11155111"
      - key: VITE_PINATA_JWT
        value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..3SsBXGtBUhr8dBkslNoOGoZO2QeSRmWXLkDqD1znIK4"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
